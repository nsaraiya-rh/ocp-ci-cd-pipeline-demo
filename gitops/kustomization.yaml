apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-app

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml

# CI updates newTag on every build; ArgoCD then rolls out the new image.
images:
  - name: sample-app-image
    newName: image-registry.openshift-image-registry.svc:5000/sample-app/sample-app
    newTag: "ee1a7351"
