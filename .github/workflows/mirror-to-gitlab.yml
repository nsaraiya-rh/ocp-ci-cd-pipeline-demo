name: Mirror to GitLab (trigger CI)

# On pushes that touch the sample app, mirror the repo to the GitLab project.
# The push into GitLab triggers the GitLab CI/CD pipeline (build -> push image
# -> bump tag in gitops/ -> ArgoCD deploys).
#
# The path filter is important: the pipeline's own "tag bump" commits only touch
# gitops/**, so they do NOT re-trigger this workflow — that avoids a build loop.
#
# Required (Settings > Secrets and variables > Actions) — both set by install.sh:
#   secret   GITLAB_PUSH_TOKEN - a GitLab token that can push to root/sample-app
#   variable GITLAB_URL        - GitLab host, e.g. gitlab.apps.<cluster-domain>

on:
  push:
    branches: [main]
    paths:
      - 'sample-app/**'
      - '.gitlab-ci.yml'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
          # Actions *variable* (not secret) so re-provisioning onto a new cluster
          # needs no code change — install.sh sets it to the new GitLab host.
          GITLAB_URL: ${{ vars.GITLAB_URL }}
        run: |
          git config --global http.sslVerify false
          git push --force \
            "https://oauth2:${GITLAB_TOKEN}@${GITLAB_URL}/root/sample-app.git" \
            HEAD:main
