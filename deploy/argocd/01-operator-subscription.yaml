---
# OpenShift GitOps operator (Red Hat supported ArgoCD).
# Installs cluster-wide; creates the `openshift-gitops` namespace with a
# default ArgoCD instance managed by the operator.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest
  installPlanApproval: Automatic
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
